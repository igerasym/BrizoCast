# Alembic configuration for BrizoCast.
#
# The runtime schema bootstrap in ``brizocast/database/bootstrap.py`` is the
# primary create/migrate path for the MVP (recreate-on-incompatible). This
# Alembic setup is minimal scaffolding so future schema changes can be managed
# as proper, reviewable migrations.
#
# The database URL is intentionally NOT hard-coded here: ``env.py`` reads it
# from the application Settings (which sources ``DATABASE_URL`` from the
# environment / .env). Generate a revision with:
#
#     alembic revision --autogenerate -m "describe change"
#
# and apply with:
#
#     alembic upgrade head

[alembic]
# Path to migration scripts (env.py, versions/), relative to this file.
script_location = brizocast/database/migrations

# Template used to generate new migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-native path separators in version_locations.
version_path_separator = os

# sqlalchemy.url is resolved at runtime in env.py from Settings.DATABASE_URL.
# A placeholder is provided so tooling that inspects this file does not error.
sqlalchemy.url = sqlite+aiosqlite:///data/brizocast.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
